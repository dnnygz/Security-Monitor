services:
  mysql:
    image: mysql:9.0
    container_name: mysql_container
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-security_monitor}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - security_net

  backend:
    build:
      context: ./back
    container_name: backend_container
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: 10.0.0.4
      DB_PORT: 3307
      DB_USER: root
      DB_PASSWORD: ProyectoRedes123
      DB_NAME: Proyecto
      JWT_SECRET: SF34TG3W3R23RF23R2D2DERJ6645Y4H
    depends_on:
      - mysql
    expose:
      - "3000"
    networks:
      - security_net

  frontend:
    build:
      context: ./front
      args:
        VITE_API_URL: ""
    container_name: frontend_container
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - security_net

volumes:
  mysql_data:

networks:
  security_net:
