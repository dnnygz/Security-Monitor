services:
  mysql:
    image: mysql:9.0
    container_name: mysql_container
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-security_monitor}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./back/schema_fixed.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./back/seed_demo.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    networks:
      - security_net

  backend:
    build:
      context: ./back
    container_name: backend_container
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me}
      DB_NAME: ${MYSQL_DATABASE:-security_monitor}
      JWT_SECRET: SF34TG3W3R23RF23R2D2DERJ6645Y4H
    depends_on:
      - mysql
    expose:
      - "3000"
    networks:
      - security_net

  frontend:
    build:
      context: ./front
      args:
        VITE_API_URL: ""
    container_name: frontend_container
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - security_net

volumes:
  mysql_data:

networks:
  security_net:
